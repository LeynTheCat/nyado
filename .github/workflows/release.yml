name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary for ${{ matrix.target }}
        run: |
          docker run --rm -v $PWD:/work -w /work clux/muslrust:latest sh -c "
            rustup target add ${{ matrix.target }} && 
            cargo build --release --target ${{ matrix.target }}
          "

      - name: Copy artifact (fix permissions)
        run: |
          sudo cp target/${{ matrix.target }}/release/nyado nyado-${{ matrix.target }}
          sudo chown $(id -u):$(id -g) nyado-${{ matrix.target }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nyado-x86_64-unknown-linux-musl
            nyado-aarch64-unknown-linux-musl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}