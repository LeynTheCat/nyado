name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Build static binary for ${{ matrix.target }}
        uses: docker://clux/muslrust:latest
        with:
          args: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: mv target/${{ matrix.target }}/release/nyado nyado-${{ matrix.target }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nyado-x86_64-unknown-linux-musl
            nyado-aarch64-unknown-linux-musl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}